---
- name: Configure Minecraft server
  hosts: minecraft
  become: true

  vars:
    minecraft_user: minecraft
    minecraft_group: minecraft
    minecraft_dir: /opt/minecraft
    minecraft_memory_min: "1G"
    minecraft_memory_max: "2G"

    minecraft_server_url: "https://piston-data.mojang.com/v1/objects/97ccd4c0ed3f81bbb7bfacddd1090b0c56f9bc51/server.jar"

  tasks:
    - name: Install packages needed for Adoptium repository
      ansible.builtin.apt:
        name:
          - wget
          - apt-transport-https
          - gpg
          - curl
        state: present
        update_cache: true

    - name: Add Adoptium GPG key
      ansible.builtin.shell: |
        wget -qO - https://packages.adoptium.net/artifactory/api/gpg/key/public | gpg --dearmor -o /usr/share/keyrings/adoptium.gpg
      args:
        creates: /usr/share/keyrings/adoptium.gpg

    - name: Add Adoptium apt repository
      ansible.builtin.copy:
        dest: /etc/apt/sources.list.d/adoptium.list
        content: "deb [signed-by=/usr/share/keyrings/adoptium.gpg] https://packages.adoptium.net/artifactory/deb noble main\n"
        mode: "0644"

    - name: Install Java 25
      ansible.builtin.apt:
        name: temurin-25-jdk
        state: present
        update_cache: true

    - name: Set Java 25 as default Java
      ansible.builtin.shell: |
        update-alternatives --set java /usr/lib/jvm/temurin-25-jdk-amd64/bin/java
      changed_when: false

    - name: Verify Java version
      ansible.builtin.command: java -version
      register: java_version_output
      changed_when: false

    - name: Show Java version
      ansible.builtin.debug:
        var: java_version_output.stderr_lines

    - name: Create minecraft group
      ansible.builtin.group:
        name: "{{ minecraft_group }}"
        state: present

    - name: Create minecraft user
      ansible.builtin.user:
        name: "{{ minecraft_user }}"
        group: "{{ minecraft_group }}"
        system: true
        shell: /usr/sbin/nologin
        home: "{{ minecraft_dir }}"
        create_home: false

    - name: Create Minecraft directory
      ansible.builtin.file:
        path: "{{ minecraft_dir }}"
        state: directory
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_group }}"
        mode: "0755"

    - name: Download Minecraft server jar
      ansible.builtin.get_url:
        url: "{{ minecraft_server_url }}"
        dest: "{{ minecraft_dir }}/server.jar"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_group }}"
        mode: "0644"

    - name: Accept Minecraft EULA
      ansible.builtin.copy:
        dest: "{{ minecraft_dir }}/eula.txt"
        content: "eula=true\n"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_group }}"
        mode: "0644"

    - name: Create server.properties
      ansible.builtin.copy:
        dest: "{{ minecraft_dir }}/server.properties"
        owner: "{{ minecraft_user }}"
        group: "{{ minecraft_group }}"
        mode: "0644"
        content: |
          server-port=25565
          motd=Acme Corp Automated Minecraft Server
          enable-command-block=false
          online-mode=true
          difficulty=easy
          gamemode=survival
          max-players=20
          view-distance=10
          simulation-distance=10

    - name: Install Minecraft start script
      ansible.builtin.template:
        src: templates/start_minecraft.sh.j2
        dest: /usr/local/bin/start_minecraft.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install Minecraft stop script
      ansible.builtin.template:
        src: templates/stop_minecraft.sh.j2
        dest: /usr/local/bin/stop_minecraft.sh
        owner: root
        group: root
        mode: "0755"

    - name: Install systemd service
      ansible.builtin.template:
        src: templates/minecraft.service.j2
        dest: /etc/systemd/system/minecraft.service
        owner: root
        group: root
        mode: "0644"

    - name: Reload systemd
      ansible.builtin.systemd_service:
        daemon_reload: true

    - name: Unmask Minecraft service
      ansible.builtin.systemd_service:
        name: minecraft
        masked: false

    - name: Enable and start Minecraft service
      ansible.builtin.systemd_service:
        name: minecraft
        enabled: true
        state: restarted